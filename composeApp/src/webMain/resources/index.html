<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TastyMap</title>
    <link type="text/css" rel="stylesheet" href="styles.css">
</head>
<body style="text-align: center; align-content: center">
<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 50 50" role="presentation">
    <circle cx="25" cy="25" r="20" stroke="#ccc" stroke-width="4" fill="none"/>
    <circle cx="25" cy="25" r="20" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"
            stroke-dasharray="90 125">
        <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s"
                          repeatCount="indefinite"/>
    </circle>
</svg>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    // 1. DÜZELTME: onMessage buraya eklenmeli
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBM8iUX0bRKR7cWTrPr79-hiB3wn8qLIGI",
        authDomain: "tastymap-12dfb.firebaseapp.com",
        projectId: "tastymap-12dfb",
        storageBucket: "tastymap-12dfb.firebasestorage.app",
        messagingSenderId: "733188538534",
        appId: "1:733188538534:web:7d9004b772de2b0b697467",
        measurementId: "G-J13MMYEGZF"
    };

    const app = initializeApp(firebaseConfig);
    const messaging = getMessaging(app);

    // Servis Worker Kaydı
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/firebase-messaging-sw.js')
  .then(async (reg) => {
      console.log('SW Kayıtlı:', reg.scope);

      // 🔥 KRİTİK: SW'yi hemen aktive et
      await reg.update();
        await reg.active?.postMessage?.({ type: "INIT" });
  })
  .catch(console.error);
    }

    // Ön plan mesaj dinleyicisi
    onMessage(messaging, (payload) => {
        console.log("Mesaj geldi (Ön planda): ", payload);
        alert("Yeni bildirim: " + payload.data.title);
    });

    window.getFcmTokenJs = async function(vapidKey) {
        try {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                const registration = await navigator.serviceWorker.ready;

const token = await getToken(messaging, {
    vapidKey: vapidKey,
    serviceWorkerRegistration: registration
});
                return token;
            } else {
                console.log("Bildirim izni reddedildi.");
                return "";
            }
        } catch (error) {
            console.error("FCM Token alınırken hata oluştu:", error);
            return "";
        }
    };
</script>
<script type="application/javascript" src="composeApp.js"></script>
</body>
</html>
