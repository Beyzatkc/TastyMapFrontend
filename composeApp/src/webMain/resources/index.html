<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TastyMap</title>

    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <link type="text/css" rel="stylesheet" href="styles.css">
    <script src="tasty-bridge.js"></script>
</head>
<body style="margin: 0; padding: 0; background-color: transparent;">

<div id="compose-root" style="position: absolute; width: 1px; height: 1px; z-index: 1; opacity: 0;">
    <script type="application/javascript" src="composeApp.js"></script>
</div>

<!-- Firebase Script'in aynı kalsın (Değişmedi) -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";
    const firebaseConfig = {
        apiKey: "AIzaSyBM8iUX0bRKR7cWTrPr79-hiB3wn8qLIGI",
        authDomain: "tastymap-12dfb.firebaseapp.com",
        projectId: "tastymap-12dfb",
        storageBucket: "tastymap-12dfb.firebasestorage.app",
        messagingSenderId: "733188538534",
        appId: "1:733188538534:web:7d9004b772de2b0b697467",
        measurementId: "G-J13MMYEGZF"
    };
    const app = initializeApp(firebaseConfig);
    const messaging = getMessaging(app);
    window.getFcmTokenJs = async function(vapidKey) {
        try {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                return await getToken(messaging, { vapidKey: vapidKey });
            } else {
                return "";
            }
        } catch (error) {
            return "";
        }
    };
</script>


</body>
</html>
